syntax = "proto3";

package game.messages;

option csharp_namespace = "Game.Messages";

import "room.proto";
import "game.proto";
import "sync.proto";

// ============================================================
// 统一消息信封
//
// 传输层：TCP 长连接 / WebSocket
// 帧格式：[4字节大端长度][protobuf序列化的 ClientMessage 或 ServerMessage]
//
// 反序列化流程：
//   1. 读取4字节长度
//   2. 读取对应字节数
//   3. 反序列化为 ClientMessage（服务端） / ServerMessage（客户端）
//   4. 根据 oneof payload 的 which_oneof 分发到业务逻辑
// ============================================================

// 客户端 → 服务端
message ClientMessage {
  int64 seq = 1;  // 客户端序号（递增，用于幂等处理和请求追踪）
  oneof payload {
    // Room System
    .game.room.CreateRoomReq create_room_req = 10;
    .game.room.JoinRoomReq join_room_req = 11;
    .game.room.LeaveRoomReq leave_room_req = 12;
    .game.room.ReadyReq ready_req = 13;
    .game.room.StartGameReq start_game_req = 14;
    .game.room.KickPlayerReq kick_player_req = 15;
    .game.room.RoomChatReq room_chat_req = 16;

    // Game Actions
    .game.game.DrawCardReq draw_card_req = 20;
    .game.game.DiscardDrawnReq discard_drawn_req = 21;
    .game.game.ReplaceWithDrawnReq replace_with_drawn_req = 22;
    .game.game.TakeFromDiscardReq take_from_discard_req = 23;
    .game.game.UseSkillReq use_skill_req = 24;
    .game.game.CallSteadyReq call_steady_req = 25;
    .game.game.EndGameEarlyReq end_game_early_req = 26;
    .game.game.EndGameEarlyDecisionReq end_game_early_decision_req = 27;

    // Sync
    .game.sync.ReconnectReq reconnect_req = 30;
    .game.sync.HeartbeatReq heartbeat_req = 31;
  }
}

// 服务端 → 客户端
message ServerMessage {
  int64 server_seq = 1;     // 服务端全局递增序号（客户端用于排序/去重）
  int64 server_time_ms = 2; // 服务端毫秒时间戳
  oneof payload {
    // Room System
    .game.room.CreateRoomRsp create_room_rsp = 10;
    .game.room.JoinRoomRsp join_room_rsp = 11;
    .game.room.LeaveRoomRsp leave_room_rsp = 12;
    .game.room.ReadyRsp ready_rsp = 13;
    .game.room.StartGameRsp start_game_rsp = 14;
    .game.room.KickPlayerRsp kick_player_rsp = 15;
    .game.room.RoomStateNotify room_state_notify = 16;
    .game.room.PlayerJoinNotify player_join_notify = 17;
    .game.room.PlayerLeaveNotify player_leave_notify = 18;
    .game.room.PlayerReadyNotify player_ready_notify = 19;
    .game.room.RoomStartNotify room_start_notify = 20;
    .game.room.RoomChatRsp room_chat_rsp = 21;
    .game.room.RoomChatNotify room_chat_notify = 22;

    // Game
    .game.game.GameStartNotify game_start_notify = 30;
    .game.game.TurnStartNotify turn_start_notify = 31;
    .game.game.DrawCardRsp draw_card_rsp = 32;
    .game.game.DiscardDrawnRsp discard_drawn_rsp = 33;
    .game.game.ReplaceWithDrawnRsp replace_with_drawn_rsp = 34;
    .game.game.TakeFromDiscardRsp take_from_discard_rsp = 35;
    .game.game.UseSkillRsp use_skill_rsp = 36;
    .game.game.CallSteadyRsp call_steady_rsp = 37;
    .game.game.EndGameEarlyRsp end_game_early_rsp = 38;
    .game.game.EndGameEarlyRequestNotify end_game_early_request_notify = 39;
    .game.game.ActionResultNotify action_result_notify = 40;
    .game.game.EndGameEarlyDecisionRsp end_game_early_decision_rsp = 41;
    .game.game.RoundRevealNotify round_reveal_notify = 42;
    .game.game.ScoreUpdateNotify score_update_notify = 43;
    .game.game.GameOverNotify game_over_notify = 44;
    .game.game.EndGameEarlyRejectedNotify end_game_early_rejected_notify = 45;

    // Sync
    .game.sync.ReconnectRsp reconnect_rsp = 50;
    .game.sync.StateSyncNotify state_sync_notify = 51;
    .game.sync.HeartbeatRsp heartbeat_rsp = 52;
  }
}
